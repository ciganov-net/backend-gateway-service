version: '3.9'

services:
  gateway-service:
    container_name: gateway-service
    image: ciganov-net/gateway-service:dev
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.production.local
    ports:
      - '4000:4000'
    volumes:
      - ../logs/gateway:/var/log/services/gateway
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - ciganov-net

networks:
  ciganov-net:
    external: true
